# Prisma-style quoted columns — cursor_expression uses PostgreSQL double-quoted identifiers.
tables:
  - schema: public
    table: Profile
    output_table_name: Profile
    enabled: true
    columns:
      - createTime
      - updateTime
      - createPlatform
      - legacyWlwId
      - legacyEpId
      - id
      - countryCode
      - email
      - givenName
      - isAdmin
      - preferredLanguage
      - salutation
      - surname
      - mobile
      - phone
      - agreements
      - identityId
      - roles
      - organisation
      - alibabaId
    cursor_column: dlt_cursor
    cursor_expression: GREATEST("createTime", "updateTime")

  - schema: public
    table: SupplierProfile
    output_table_name: SupplierProfile
    enabled: true
    columns:
      - id
      - createTime
      - updateTime
      - profileId
      - supplierFactId
    cursor_column: dlt_cursor
    cursor_expression: GREATEST("createTime", "updateTime")
