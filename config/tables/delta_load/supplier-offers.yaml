tables:
  - schema: public
    table: images
    output_table_name: images
    enabled: true
    columns:
      - id
      - caption
      - image_file
      - offer_data_images
      - create_time
      - update_time
      - position
      - translations_caption
    cursor_column: dlt_cursor
    cursor_expression: GREATEST(create_time, update_time)

  - schema: public
    table: uploads
    output_table_name: uploads
    enabled: true
    columns:
      - id
      - filename
      - create_time
      - size
      - mime_type
      - url
      - update_time
      - origins_header_etag
      - origins_header_last_modified
      - origins_location
      - amount_of_refs
    cursor_column: dlt_cursor
    cursor_expression: GREATEST(create_time, update_time)

  - schema: public
    table: revisions
    output_table_name: revisions
    enabled: true
    # Without initial_value, dlt stores last_value=null on first run → no WHERE clause, full table
    # scan + sort by dlt_cursor (~hours for wide jsonb). Seed the cursor so the query is always
    # `WHERE dlt_cursor > :lv ORDER BY dlt_cursor`, which can use an index (see DDL below).
    initial_value: "1970-01-01T00:00:00+00:00"
    extract_chunk_size: 50000
    select_sql: |
      id::text AS id,
      create_time,
      update_time,
      "source",
      "action",
      client_id,
      client_name,
      supplier_id::text AS supplier_id,
      "snapshot"::text AS snapshot,
      offer_id::text AS offer_id
    output_columns:
      - id
      - create_time
      - update_time
      - source
      - action
      - client_id
      - client_name
      - supplier_id
      - snapshot
      - offer_id
      - dlt_cursor
    cursor_column: dlt_cursor
    cursor_expression: GREATEST(create_time, update_time)