      - id
      - caption
      - image_file
      - offer_data_images
      - create_time
      - update_time
      - position
      - translations_caption
    primary_key: id
    initial_value: "1970-01-01"
    cursor_column: create_time
    updated_column: update_time
    enabled: false

  - schema: public
    table: uploads
    columns:
      - id
      - filename
      - create_time
      - size
      - mime_type
