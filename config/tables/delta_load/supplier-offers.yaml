      - origins_header_last_modified
      - origins_location
      - amount_of_refs
    primary_key: id
    initial_value: "1970-01-01"
    cursor_column: create_time
    updated_column: update_time
    enabled: false

  - schema: public
    table: revisions
    columns:
      - id
      - create_time
      - update_time
