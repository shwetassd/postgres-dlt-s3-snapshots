tables:
  - schema: public
    table: configurations
    output_table_name: configurations
    enabled: true
    select_sql: |
      profile_id,
      supplier_notifications_enabled,
      created_at,
      updated_at,
      web_push_subscription ->> 'endpoint' AS endpoint,
      web_push_subscription -> 'keys' ->> 'auth' AS auth,
      web_push_subscription -> 'keys' ->> 'p256dh' AS p256dh,
      message_notifications_enabled

  - schema: public
    table: notifications
    output_table_name: notifications
    enabled: true
    select_sql: |
      id::text as id,
      profile_id,
      kind,
      title,
      unread,
      count,
      created_at,
      updated_at,
      REGEXP_REPLACE(TRIM(payload ->> 'sender'), '\s+', ' ', 'g') AS sender,
      REGEXP_REPLACE(TRIM(payload ->> 'message'), '\s+', ' ', 'g') AS message,
      REGEXP_REPLACE(TRIM(payload ->> 'conversation_id'), '\s+', ' ', 'g') AS conversation_id,
      channels