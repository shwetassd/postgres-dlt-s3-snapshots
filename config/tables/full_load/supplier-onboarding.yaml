tables:
  - schema: public
    table: report_published_drafts
    output_table_name: report_published_drafts
    enabled: true
    select_sql: |
    columns:
      - import_task_id
      - draft_id
      - offer_id
      - published_at
      - created_at

  - schema: public
    table: report_product_filling_score
    output_table_name: report_product_filling_score
    enabled: true
    select_sql: |
      id,
      supplier_offer_id::text as supplier_offer_id,
      supplier_facts_id::text as supplier_facts_id,
      category_score,
      description_score,
      image_score,
      keyword_score,
      moq_score,
      name_score,
      price_score,
      property_score,
      total_score,
      adjusted_total_score,
      master_language,
      updated_at,
      updated_by::text as updated_by,
      offer_status,
      record_created_at,
      record_updated_at,
      "snapshot"::text as snapshot,
      COALESCE(platform::text, '') as platform
    output_columns:
      - id
      - supplier_offer_id
      - supplier_facts_id
      - category_score
      - description_score
      - image_score
      - keyword_score
      - moq_score
      - name_score
      - price_score
      - property_score
      - total_score
      - adjusted_total_score
      - master_language
      - updated_at
      - updated_by
      - offer_status
      - record_created_at
      - record_updated_at
      - snapshot
      - platform
      
  - schema: public
    table: offers
    output_table_name: supplier_onboarding_offers
    enabled: true
    select_sql: |
      offer_id::text as offer_id,
      supplier_id,
      COALESCE(product_details::text, '') as product_details,
      COALESCE(create_by, '') as create_by,
      published,
      deleted,
      created_at,
      updated_at,
      status,
      COALESCE(origin_product_id, '') as origin_product_id,
      COALESCE(array_to_json(platforms)::text, '[]') as platforms
    output_columns:
      - offer_id
      - supplier_id
      - product_details
      - create_by
      - published
      - deleted
      - created_at
      - updated_at
      - status
      - origin_product_id
      - platforms
