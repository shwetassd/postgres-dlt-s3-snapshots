tables:
  - schema: public
    table: platform_user
    output_table_name: platform_user
    enabled: true
    columns:
      - user_id
      - external_id
      - email
      - country
      - full_name
      - source_platform
      - address
      - is_anonymized
      - created_at
      - modified_at
      - platform
      - user_profile_id

  - schema: public
    table: conversation_tag
    output_table_name: conversation_tag
    enabled: true
    columns:
      - conversation_id
      - tag

  - schema: public
    table: user_conversation_status
    output_table_name: user_conversation_status
    enabled: true
    columns:
      - user_id
      - conversation_id
      - is_read
      - is_inactive
      - created_at
      - modified_at

  - schema: public
    table: user_organization
    output_table_name: user_organization
    enabled: true
    columns:
      - user_id
      - organization_id
      - created_at
      - modified_at

  - schema: public
    table: spam_report
    output_table_name: spam_report
    enabled: true
    columns:
      - id
      - conversation_id
      - reason
      - user_id
      - reporter_profile_id
      - created_at
      - modified_at
      - is_deleted

  - schema: public
    table: conversation
    output_table_name: conversation
    enabled: true
    columns:
      - conversation_id
      - organization_id
      - request_type
      - created_at
      - modified_at
      - sender_id
      - product_id
      - is_answered
      - is_frozen
      - is_archived
      - hidden_from_sender
      - platform_code
    
  - schema: public
    table: organization
    output_table_name: organization
    enabled: true
    columns:
      - organization_id
      - organization_name
      - description
      - address
      - country
      - logo_url
      - created_at
      - modified_at
    
  - schema: public
    table: message
    output_table_name: conversations_message
    enabled: true
    columns:
      - id
      - conversation_id
      - message_type
      - contents
      - created_by
      - created_at
      - updated_at
      - status
      - sent_from
