tables:
  - schema: public
    table: platform_user
    enabled: false
    columns:
      - user_id
      - external_id
      - email
      - country
      - full_name
      - source_platform
      - address
      - is_anonymized
      - created_at
      - modified_at

  - schema: public
    table: conversation_tag
    enabled: false
    columns:
      - conversation_id
      - tag

  - schema: public
    table: user_conversation_status
    enabled: false
    columns:
      - user_id
      - conversation_id
      - is_read
      - is_inactive
      - created_at
      - modified_at

  - schema: public
    table: user_organization
    enabled: false
    columns:
      - user_id
      - organization_id
      - created_at
      - modified_at

  - schema: public
    table: spam_report
    enabled: false
    columns:
      - id
      - conversation_id
      - reason
      - user_id
      - reporter_profile_id
      - created_at
      - modified_at
      - is_deleted