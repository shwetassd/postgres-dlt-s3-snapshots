tables:
  - schema: public
    table: contact_form_message_type_classification
    enabled: false
    columns:
      - contact_form_message_id
      - predicted_message_type
      - user_given_message_type

  - schema: public
    table: contact_form_message
    enabled: false
    columns:
      - id
      - sender_salutation
      - sender_first_name
      - sender_last_name
      - sender_email
      - sender_company_name
      - sender_phone_number
      - receiver_email
      - receiver_company_id
      - is_private_request
      - message_type
      - subject
      - status
      - request_received_at
      - email_send_at
      - is_spam
      - mail_provider
      - mail_provider_message_id
      - mail_provider_error_code
      - sender_full_name
      - source
      - status_reason
      - conversation_id
      - product_id
      - metadata
      - message

  - schema: public
    table: one_platform_direct_requests_status
    enabled: false
    columns:
      - id
      - request_iteration_object
      - created_at
      - updated_at

  - schema: public
    table: analytics_qdr_to_rfq
    enabled: false
    columns:
      - request_id
      - direct_request_to_rfq_request_object
      - created_at
      - updated_at
      - version

  - schema: public
    table: reply_message
    enabled: false
    select_sql: |
      id,
      conversation_id,
      is_first_reply,
      sender_user_id,
      sender_user_email,
      receiver_user_id,
      receiver_user_email,
      event_received_at,
      email_send_at,
      mail_provider,
      mail_provider_message_id,
      mail_provider_error_code,
      status,
      status_reason,
      mail_provider_status_id,
      mail_provider_status,
      mail_provider_send_result,
      regexp_replace(message_content, E'[\r\n]+', ' ', 'g') AS message_content,
      metadata