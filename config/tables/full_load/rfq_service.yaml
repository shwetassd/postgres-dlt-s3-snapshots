tables:
  - schema: public
    table: matching_conversation
    output_table_name: matching_conversation
    enabled: true
    select_sql: |
      id,
      matching_id::text as matching_id,
      rfq_id::text as rfq_id,
      supplier_uuid::text as supplier_uuid,
      sender_user_id::text as sender_user_id,
      conversation_id::text as conversation_id,
      created_at,
      first_reply_from_purchaser_at,
      first_reply_message_from_supplier,
      first_reply_from_supplier_at,
      first_reply_message_from_purchaser,
      unified_supplier_id::text as unified_supplier_id
    output_columns:
      - id
      - matching_id
      - rfq_id
      - supplier_uuid
      - sender_user_id
      - conversation_id
      - created_at
      - first_reply_from_purchaser_at
      - first_reply_message_from_supplier
      - first_reply_from_supplier_at
      - first_reply_message_from_purchaser
      - unified_supplier_id

  - schema: public
    table: matching_logs
    output_table_name: matching_logs
    enabled: true
    columns:
      - id
      - matching_id
      - action_code
      - status
      - created_at

  - schema: public
    table: legacy_rfq_to_rfq_id_mapping
    output_table_name: legacy_rfq_to_rfq_id_mapping
    enabled: true
    columns:
      - id
      - legacy_rfq_id
      - rfq_id
      - platform_code
      - created_at

  - schema: public
    table: matching_core
    output_table_name: matching_core
    enabled: true
    select_sql: |
      matching_id::text as matching_id,
      rfq_id::text as rfq_id,
      supplier_uuid::text as supplier_uuid,
      REPLACE(REPLACE(supplier_name, E'\n', ' '), E'\r', ' ') AS supplier_name,
      supplier_key,
      supplier_platform_id,
      is_customer,
      created_at,
      updated_at,
      published_at,
      status,
      origin,
      unified_supplier_id::text as unified_supplier_id
    output_columns:
      - matching_id
      - rfq_id
      - supplier_uuid
      - supplier_name
      - supplier_key
      - supplier_platform_id
      - is_customer
      - created_at
      - updated_at
      - published_at
      - status
      - origin
      - unified_supplier_id

  - schema: public
    table: rfq_processing
    output_table_name: rfq_processing
    enabled: true
    # Stable Arrow types across chunks (avoid timestamp vs string drift on nullable cols).
    select_sql: |
      id,
      rfq_id::text AS rfq_id,
      accepted_at,
      accepted_by,
      rejected_at,
      rejected_by,
      rejection_reason,
      matching_started_at,
      interested_suppliers,
      edited_at,
      edited_by,
      closed_at,
      closed_by,
      expiry_date,
      limit_reached_at::text AS limit_reached_at
    output_columns:
      - id
      - rfq_id
      - accepted_at
      - accepted_by
      - rejected_at
      - rejected_by
      - rejection_reason
      - matching_started_at
      - interested_suppliers
      - edited_at
      - edited_by
      - closed_at
      - closed_by
      - expiry_date
      - limit_reached_at

  - schema: public
    table: rfq_user
    output_table_name: rfq_user
    enabled: true
    select_sql: |
      rfq_user_id,
      user_profile_id::text as user_profile_id,
      replace(email, 'inactive_user_', '') AS email,
      full_name,
      language_code,
      country_code,
      created_at,
      updated_at
    output_columns:
      - rfq_user_id
      - user_profile_id
      - email
      - full_name
      - language_code
      - country_code
      - created_at
      - updated_at

  - schema: public
    table: recommended_supplier
    output_table_name: recommended_supplier
    enabled: true
    # DDL: supplier_types/products/keywords/product_categories are PostgreSQL text[] → export as JSON array
    # text via array_to_json (not json/jsonb types). raw_recommendation_json is jsonb → ::text is JSON text.
    # Row weight is dominated by jsonb size × chunk rows (not a pandas “bug”). Smaller chunks reduce peak RAM.
    extract_chunk_size: 15000
    select_sql: |
      id,
      rfq_id::text as rfq_id,
      supplier_id::text as supplier_id,
      COALESCE("name", '') as name,
      COALESCE(website, '') as website,
      COALESCE(profile_url, '') as profile_url,
      COALESCE(country, '') as country,
      COALESCE(distribution_area, '') as distribution_area,
      COALESCE(description, '') as description,
      COALESCE(description_de, '') as description_de,
      COALESCE(description_en, '') as description_en,
      COALESCE(array_to_json(supplier_types)::text, '[]') as supplier_types,
      COALESCE(array_to_json(products)::text, '[]') as products,
      COALESCE(array_to_json(keywords)::text, '[]') as keywords,
      COALESCE(array_to_json(product_categories)::text, '[]') as product_categories,
      created_at,
      COALESCE(status, '') as status,
      COALESCE(is_customer, false) as is_customer,
      COALESCE(customer_in_need, false) as customer_in_need,
      COALESCE(match_type, '') as match_type,
      COALESCE(raw_recommendation_json::text, '') as raw_recommendation_json,
      COALESCE(unified_supplier_id::text, '') as unified_supplier_id
    output_columns:
      - id
      - rfq_id
      - supplier_id
      - name
      - website
      - profile_url
      - country
      - distribution_area
      - description
      - description_de
      - description_en
      - supplier_types
      - products
      - keywords
      - product_categories
      - created_at
      - status
      - is_customer
      - customer_in_need
      - match_type
      - raw_recommendation_json
      - unified_supplier_id